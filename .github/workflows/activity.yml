name: Update Merged PRs
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/github-merged-pull-requests@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Kengne-yvana
